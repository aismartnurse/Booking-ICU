<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<title>ICU Bed Dashboard</title>
<style>
  * { box-sizing: border-box; }
  body { font-family: -apple-system, "Segoe UI", Roboto, sans-serif; background:#f4f6f8; margin:0; color:#1a1a1a; }
  header { background:#06c755; color:#fff; padding:16px 24px; display:flex; justify-content:space-between; align-items:center; }
  header h1 { margin:0; font-size:20px; }
  header .btns { display:flex; gap:8px; }
  main { max-width:1300px; margin:0 auto; padding:24px; }
  .grid { display:grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap:10px; margin-bottom:24px; }
  .bed { border-radius:10px; padding:14px 8px; text-align:center; color:#fff; font-weight:700; cursor:pointer; font-size:18px; min-height:80px; display:flex; flex-direction:column; justify-content:center; align-items:center; }
  .bed.available { background:#27ae60; }
  .bed.occupied { background:#c0392b; }
  .bed.cleaning { background:#f39c12; }
  .bed.closed { background:#7f8c8d; }
  .bed small { display:block; font-weight:400; font-size:11px; margin-top:4px; }
  table { width:100%; border-collapse:collapse; background:#fff; border-radius:8px; overflow:hidden; }
  th, td { padding:9px 10px; text-align:left; font-size:12px; border-bottom:1px solid #eee; vertical-align:middle; }
  th { background:#fafafa; font-weight:600; }
  .badge { padding:2px 8px; border-radius:20px; font-size:11px; font-weight:700; }
  .badge.pending { background:#fef5e7; color:#b9770e; }
  .badge.approved { background:#eafaf1; color:#1e8449; }
  .badge.rejected { background:#fdecea; color:#c0392b; }
  .badge.plan { background:#eaf2fb; color:#1a5276; }
  .badge.unplan { background:#fdecea; color:#c0392b; }
  .badge.or { background:#f5eef8; color:#7d3c98; }
  .badge.crisis { background:#fdecea; color:#c0392b; }
  section { margin-bottom:32px; }
  h2 { font-size:15px; border-left:4px solid #06c755; padding-left:10px; }
  #loginBox { max-width:320px; margin:80px auto; background:#fff; padding:24px; border-radius:12px; box-shadow:0 1px 6px rgba(0,0,0,0.1); }
  #loginBox input { width:100%; padding:10px; margin:6px 0; border:1px solid #ddd; border-radius:8px; }
  #loginBox button { width:100%; padding:12px; background:#06c755; color:#fff; border:none; border-radius:8px; font-weight:700; margin-top:8px; cursor:pointer; }
  .hdr-btn { background:none; border:1px solid #fff; color:#fff; padding:6px 14px; border-radius:6px; cursor:pointer; font-size:14px; }
  .link-btn { color:#06c755; cursor:pointer; font-weight:600; text-decoration:underline; background:none; border:none; font-size:12px; padding:0; }
  .tab-bar { display:flex; gap:4px; margin-bottom:12px; }
  .tab-btn { padding:7px 14px; border:none; border-radius:8px; cursor:pointer; font-size:12px; background:#eee; }
  .tab-btn.active { background:#06c755; color:#fff; font-weight:700; }

  /* urgency single button */
  .urg-btn { width:28px; height:28px; border-radius:50%; border:2px solid rgba(0,0,0,0.15); cursor:pointer; transition:transform 0.1s; }
  .urg-btn:hover { transform:scale(1.15); }
  .urg-btn.emergency { background:#e74c3c; }
  .urg-btn.urgent { background:#f39c12; }
  .urg-btn.normal { background:#27ae60; }

  /* action dropdown */
  .action-sel { padding:5px 8px; border-radius:6px; border:1px solid #ddd; font-size:12px; cursor:pointer; background:#fff; }

  .adm-select { padding:4px 6px; border-radius:6px; border:1px solid #ddd; font-size:11px; cursor:pointer; }

  /* modals */
  .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:1000; justify-content:center; align-items:center; }
  .modal-overlay.show { display:flex; }
  .modal { background:#fff; border-radius:14px; padding:24px; max-width:500px; width:92%; max-height:85vh; overflow-y:auto; position:relative; }
  .modal h3 { margin:0 0 14px; font-size:16px; }
  .modal-row { display:flex; justify-content:space-between; padding:7px 0; border-bottom:1px solid #f0f0f0; font-size:13px; }
  .modal-row b { color:#555; min-width:140px; }
  .modal-close { width:100%; margin-top:14px; padding:10px; background:#f4f6f8; border:none; border-radius:8px; cursor:pointer; }
  select.role-select { padding:4px; border-radius:6px; }
</style>
</head>
<body>

<div id="loginBox">
  <h2>เข้าสู่ระบบผู้ดูแล</h2>
  <input id="un" placeholder="Username" />
  <input id="pw" type="password" placeholder="Password" />
  <button id="loginBtn">เข้าสู่ระบบ</button>
  <div id="loginErr" style="color:red;font-size:13px;margin-top:8px;"></div>
</div>

<div id="appBody" style="display:none;">
  <header>
    <h1>🏥 ICU Bed Dashboard</h1>
    <div class="btns">
      <button id="soundBtn" class="hdr-btn" onclick="unlockAudio()">🔕 เปิดเสียง</button>
      <button class="hdr-btn" id="settingsBtn">⚙️ จัดการสิทธิ์</button>
      <button class="hdr-btn" id="logoutBtn">ออกจากระบบ</button>
    </div>
  </header>
  <main>
    <section>
      <h2>สถานะเตียง ICU (คลิกเพื่อเปลี่ยนสถานะ)</h2>
      <div class="grid" id="bedsGrid"></div>
    </section>
    <section>
      <h2>คำขอจองเตียง ICU</h2>
      <div style="display:flex;gap:10px;margin-bottom:12px;flex-wrap:wrap;align-items:center;">
        <input id="searchInput" type="text" placeholder="🔍 ค้นหาชื่อ, HN, หอผู้ป่วย..." style="padding:7px 12px;border:1px solid #ddd;border-radius:8px;font-size:13px;min-width:220px;" oninput="renderSubs()" />
        <div style="display:flex;align-items:center;gap:6px;font-size:13px;">
          <label style="color:#555;">📅 วันที่ต้องการใช้เตียง:</label>
          <input id="dateFilter" type="date" style="padding:6px 10px;border:1px solid #ddd;border-radius:8px;font-size:13px;" onchange="renderSubs()" />
          <button onclick="document.getElementById('dateFilter').value='';renderSubs();" style="padding:6px 10px;border:1px solid #ddd;border-radius:8px;font-size:12px;cursor:pointer;background:#fff;">✕ ล้าง</button>
        </div>
        <button id="showAllBtn" onclick="toggleShowAll()" style="padding:7px 14px;border:1px solid #ddd;border-radius:8px;font-size:12px;cursor:pointer;background:#fff;">📋 แสดงทั้งหมด</button>
      </div>
      <table>
        <thead><tr><th>วันที่ส่งคำขอ</th><th>ผู้ป่วย / HN</th><th>หอผู้ป่วย</th><th>ประเภท</th><th>วันที่ต้องการใช้เตียง</th><th>ความเร่งด่วน</th><th>สถานะ / ดำเนินการ</th><th>สถานะเข้า ICU</th><th>ICU Type</th></tr></thead>
        <tbody id="subBody"></tbody>
      </table>
    </section>
  </main>
</div>

<!-- modal รายละเอียด -->
<div class="modal-overlay" id="detailModal">
  <div class="modal">
    <h3 id="detailTitle"></h3>
    <div id="detailBody"></div>
    <button class="modal-close" onclick="document.getElementById('detailModal').classList.remove('show')">ปิด</button>
  </div>
</div>

<!-- modal จัดการสิทธิ์ -->
<div class="modal-overlay" id="settingsModal">
  <div class="modal" style="max-width:700px;">
    <h3>⚙️ จัดการสิทธิ์ผู้ใช้ LINE</h3>
    <table>
      <thead><tr><th>ชื่อ LINE</th><th>LINE userId</th><th>สิทธิ์</th><th>เปลี่ยนสิทธิ์</th></tr></thead>
      <tbody id="usersBody"></tbody>
    </table>
    <button class="modal-close" onclick="document.getElementById('settingsModal').classList.remove('show')">ปิด</button>
  </div>
</div>

<script>
var allSubs = [];



var bedStatusLabel = { available:'ว่าง', occupied:'มีผู้ป่วย', cleaning:'ทำความสะอาด', closed:'ปิดใช้งาน' };
var nextStatus = { available:'occupied', occupied:'cleaning', cleaning:'available', closed:'available' };
var formTypeLabel = { or:'OR', crisis:'Crisis' };
var icuTypeLabel = { plan:'📋 Plan', unplan:'🚨 Unplan' };
var admLabel = { pending:'รอติดตาม', confirmed:'✅ เข้า ICU', return_ward:'❌ ไม่เข้า ICU' };
var statusLabel = {
  pending: '⏳ รอดำเนินการ',
  acknowledged: '✅ รับทราบ รอดำเนินการ',
  waiting_bed: '🟡 รับทราบ รอเตียงว่าง',
};
var statusColor = {
  pending: '#b9770e',
  acknowledged: '#1e8449',
  waiting_bed: '#b7770d',
  failed: '#c0392b'
};
var statusBg = {
  pending: '#fef5e7',
  acknowledged: '#eafaf1',
  waiting_bed: '#fef9e7',
  failed: '#fdecea'
};
var fieldLabels = { doctor:'แพทย์ผู้ผ่าตัด', surgery_name:'ชื่อการผ่าตัด', booking_date:'วันที่ต้องการจอง', system:'ระบบ', sbp:'SBP (mmHg.)', hr:'HR (bpm.)', rr:'RR (bpm.)', temp:'Temp (°C)', sos_score:'SOS score', conscious:'Conscious', urine:'ปริมาณปัสสาวะ/8hrs', reason:'เรื่องที่ต้องการจอง' };

document.getElementById('loginBtn').onclick = async function() {
  var res = await fetch('/api/admin/login', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({username:document.getElementById('un').value, password:document.getElementById('pw').value}) });
  if (res.ok) { showApp(); } else { document.getElementById('loginErr').textContent = 'username หรือ password ไม่ถูกต้อง'; }
};
document.getElementById('logoutBtn').onclick = async function() { await fetch('/api/admin/logout',{method:'POST'}); location.reload(); };
document.getElementById('settingsBtn').onclick = function() { document.getElementById('settingsModal').classList.add('show'); };



// ปิด modal เมื่อคลิกนอก
['detailModal','settingsModal'].forEach(function(id) {
  document.getElementById(id).onclick = function(e) { if(e.target===this) this.classList.remove('show'); };
});

async function checkAuth() {
  var r = await fetch('/api/admin/check').then(function(r){return r.json();});
  if (r.isAdmin) showApp();
}

function showApp() {
  document.getElementById('loginBox').style.display='none';
  document.getElementById('appBody').style.display='block';
  loadAll();
  setInterval(loadAll, 10000);
}

var lastSubCount = null;
var alertInterval = null;
var audioCtx = null;
var audioUnlocked = false;

function unlockAudio() {
  if (audioUnlocked) return;
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    var osc = audioCtx.createOscillator();
    var gain = audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination);
    gain.gain.setValueAtTime(0.01, audioCtx.currentTime);
    osc.start(); osc.stop(audioCtx.currentTime + 0.01);
    audioUnlocked = true;
    document.getElementById('soundBtn').textContent = '🔔 เสียงเปิดอยู่';
    document.getElementById('soundBtn').style.background = '#27ae60';
    document.getElementById('soundBtn').style.color = '#fff';
    alert('✅ เปิดเสียงแจ้งเตือนเรียบร้อย');
  } catch(e) { alert('ไม่สามารถเปิดเสียงได้: ' + e.message); }
}

function beep() {
  if (!audioUnlocked || !audioCtx) return;
  if (audioCtx.state === 'suspended') audioCtx.resume();
  [[0,1400],[0.12,900],[0.24,1400],[0.36,900]].forEach(function(p) {
    var o = audioCtx.createOscillator();
    var g = audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    o.frequency.value = p[1]; o.type = 'square';
    g.gain.setValueAtTime(0.35, audioCtx.currentTime + p[0]);
    g.gain.linearRampToValueAtTime(0, audioCtx.currentTime + p[0] + 0.1);
    o.start(audioCtx.currentTime + p[0]);
    o.stop(audioCtx.currentTime + p[0] + 0.12);
  });
}

function playAlert() {
  if (alertInterval) return;
  beep();
  alertInterval = setInterval(beep, 650);
}

function stopAlert() {
  if (alertInterval) { clearInterval(alertInterval); alertInterval = null; }
}

async function loadAll() {
  try {
    var beds = await fetch('/api/beds').then(function(r){return r.json();});
    var subs = await fetch('/api/form-submissions').then(function(r){return r.json();});
    var users = await fetch('/api/admin/users').then(function(r){return r.json();});
    renderBeds(beds);
    allSubs = subs;

    // ตรวจจับ: ถ้ามี pending อยู่ → เล่นเสียง, ถ้าไม่มี → หยุด
    var hasPending = subs.some(function(r) { return r.status === 'pending'; });
    if (hasPending) {
      playAlert();
    } else {
      stopAlert();
    }
    lastSubCount = subs.length;
    renderSubs();
    renderUsers(users);
  } catch(e) { console.log('error:', e); }
}

function renderBeds(beds) {
  // หาผู้ป่วยที่เข้า ICU แล้วจับคู่กับเตียง
  var patientMap = {};
  allSubs.forEach(function(s) {
    if (s.admission_status === 'confirmed' && s.assigned_bed) {
      patientMap[s.assigned_bed] = { name: s.patient_name || '-', hn: s.patient_hn || '-' };
    }
  });

  document.getElementById('bedsGrid').innerHTML = beds.map(function(b) {
    var pt = patientMap[b.label];
    var info = (b.status === 'occupied' && pt)
      ? '<small style="font-size:12px;font-weight:700;margin-top:6px;display:block;">'+pt.name+'</small>'
        +'<small style="font-size:11px;opacity:0.9;font-weight:500;">HN: '+pt.hn+'</small>'
      : '<small>'+bedStatusLabel[b.status]+'</small>';
    return '<div class="bed '+b.status+'" onclick="cycleBed('+b.id+',\''+b.status+'\')" style="min-height:70px;">'+b.label+info+'</div>';
  }).join('');
}

async function cycleBed(id, cur) {
  var next = nextStatus[cur];
  if (!confirm('เปลี่ยนสถานะเตียงเป็น "'+bedStatusLabel[next]+'" ?')) return;
  await fetch('/api/admin/beds/'+id, {method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({status:next})});
  loadAll();
}

function renderSubs() {
  var search = (document.getElementById('searchInput').value||'').toLowerCase();
  var dateFilter = document.getElementById('dateFilter').value; // YYYY-MM-DD

  var rows = allSubs;

  // กรองตาม showAll - ถ้าไม่ showAll จะแสดงเฉพาะ รอติดตาม
  if (!showAll) {
    rows = rows.filter(function(r) {
      return (r.admission_status || 'pending') === 'pending';
    });
  }

  // กรองตาม search
  if (search) {
    rows = rows.filter(function(r) {
      return (r.patient_name||'').toLowerCase().includes(search)
          || (r.patient_hn||'').toLowerCase().includes(search)
          || (r.ward||'').toLowerCase().includes(search);
    });
  }

  // กรองตามวันที่จอง (booking_date จาก extra_data)
  if (dateFilter) {
    rows = rows.filter(function(r) {
      var extra = typeof r.extra_data==='string' ? JSON.parse(r.extra_data) : (r.extra_data||{});
      var bd = extra.booking_date || '';
      if (!bd) return false;
      try {
        var parts = bd.includes('/') ? bd.split('/') : bd.split('-');
        var d, m, y;
        if (bd.includes('/')) { d=parts[0]; m=parts[1]; y=parts[2]; }
        else { y=parts[0]; m=parts[1]; d=parts[2]; }
        var bdFormatted = y.padStart(4,'0')+'-'+m.padStart(2,'0')+'-'+d.padStart(2,'0');
        return bdFormatted === dateFilter;
      } catch(e) { return false; }
    });
  }

  // เรียงตามความเร่งด่วน: แดง → เหลือง → เขียว (ทำหลัง filter)
  var urgOrder = { emergency: 0, urgent: 1, normal: 2 };
  rows = rows.slice().sort(function(a, b) {
    var ua = urgOrder[a.urgency] !== undefined ? urgOrder[a.urgency] : 2;
    var ub = urgOrder[b.urgency] !== undefined ? urgOrder[b.urgency] : 2;
    return ua - ub;
  });

  if (!rows.length) {
    document.getElementById('subBody').innerHTML='<tr><td colspan="10" style="text-align:center;color:#999;padding:20px;">ไม่มีรายการ</td></tr>';
    return;
  }

  document.getElementById('subBody').innerHTML = rows.map(function(r) {
    var urg = r.urgency||'normal';
    var adm = r.admission_status||'pending';
    var st = r.status||'pending';
    var extra = typeof r.extra_data==='string' ? JSON.parse(r.extra_data) : (r.extra_data||{});
    var bookingDate = extra.booking_date || '-';

    var urgNext = {normal:'urgent', urgent:'emergency', emergency:'normal'};
    var dot = '<button class="urg-btn '+urg+'" title="คลิกเปลี่ยน" onclick="updateUrg('+r.id+',\''+urgNext[urg]+'\')"></button>';

    // สถานะ dropdown ใหม่
    var st = r.status||'pending';
    var stCell = '<select class="action-sel" onchange="updateStatus('+r.id+',this)" style="border-color:'+(statusColor[st]||'#ddd')+';color:'+(statusColor[st]||'#333')+';background:'+(statusBg[st]||'#fff')+';font-weight:600;">'
      +'<option value="pending"'+(st==='pending'?' selected':'')+'>⏳ รอดำเนินการ</option>'
      +'<option value="acknowledged"'+(st==='acknowledged'?' selected':'')+'>✅ รับทราบ รอดำเนินการ</option>'
      +'<option value="waiting_bed"'+(st==='waiting_bed'?' selected':'')+'>🟡 รับทราบ รอเตียงว่าง</option>'
      +'</select>';

    // ICU Type editable
    var icuCell = '<select class="adm-select" onchange="updateIcuType('+r.id+',this.value)">'
      +'<option value="plan"'+(r.icu_type==='plan'?' selected':'')+'>📋 Plan</option>'
      +'<option value="unplan"'+(r.icu_type==='unplan'?' selected':'')+'>🚨 Unplan</option>'
      +'</select>';

    var sentDate = new Date(r.submitted_at).toLocaleString('th-TH',{day:'2-digit',month:'2-digit',year:'2-digit',hour:'2-digit',minute:'2-digit'});

    return '<tr>'
      +'<td style="font-size:11px;color:#555;">'+sentDate+'</td>'
      +'<td><button class="link-btn" onclick="showDetail('+r.id+')">'+(r.patient_name||'-')+'</button><br><span style="font-size:10px;color:#888;">HN: '+(r.patient_hn||'-')+'</span></td>'
      +'<td>'+(r.ward||'-')+'</td>'
      +'<td><span class="badge '+(r.form_type||'')+'">'+(formTypeLabel[r.form_type]||r.form_type||'-')+'</span></td>'
      +'<td style="font-weight:600;color:#2c3e50;">'+bookingDate+'</td>'
      +'<td>'+dot+'</td>'
      +'<td>'+stCell+'</td>'
      +'<td>'
        +'<select class="adm-select" onchange="updateAdm('+r.id+',this.value)">'
          +'<option value="pending"'+(adm==='pending'?' selected':'')+'>รอติดตาม</option>'
          +'<option value="confirmed"'+(adm==='confirmed'?' selected':'')+'>✅ เข้า ICU</option>'
          +'<option value="return_ward"'+(adm==='return_ward'?' selected':'')+'>❌ ไม่เข้า ICU</option>'
        +'</select>'
        +(adm==='confirmed' && r.assigned_bed
          ? '<br><span style="font-size:11px;font-weight:700;color:#1e8449;">🛏️ '+r.assigned_bed+'</span>'
            +' <button onclick="moveBed('+r.id+',\''+r.assigned_bed+'\')" style="font-size:10px;padding:2px 6px;background:#f39c12;color:#fff;border:none;border-radius:4px;cursor:pointer;">ย้ายเตียง</button>'
          : '')
      +'</td>'
      +'<td>'+icuCell+'</td>'
      +'</tr>';
  }).join('');
}

async function handleAction(id, sel) {
  var decision = sel.value;
  if (!decision) return;
  sel.value = '';
  var assignedBed=null, note='';
  if (decision==='approved') {
    var beds = await fetch('/api/beds').then(function(r){return r.json();});
    var avail = beds.filter(function(b){return b.status==='available';});
    if (!avail.length) { alert('ไม่มีเตียงว่าง'); return; }
    assignedBed = prompt('เลือกเตียง:\n'+avail.map(function(b){return b.label;}).join(', ')+'\n\nพิมพ์ชื่อเตียง:');
    if (!assignedBed) return;
    var bed = avail.find(function(b){return b.label===assignedBed.trim();});
    if (!bed) { alert('ชื่อเตียงไม่ถูกต้อง'); return; }
    note = prompt('หมายเหตุ (ถ้ามี):') || '';
    await fetch('/api/admin/beds/'+bed.id, {method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({status:'occupied'})});
  } else {
    note = prompt('ระบุเหตุผลที่ปฏิเสธ:') || '';
  }
  await fetch('/api/form-submissions/'+id+'/decision', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({decision:decision,assignedBed:assignedBed,note:note})});
  loadAll();
}

var showAll = false;

function toggleShowAll() {
  showAll = !showAll;
  var btn = document.getElementById('showAllBtn');
  btn.style.background = showAll ? '#06c755' : '#fff';
  btn.style.color = showAll ? '#fff' : '#333';
  btn.textContent = showAll ? '✅ แสดงทั้งหมด' : '📋 แสดงทั้งหมด';
  renderSubs();
}

async function updateStatus(id, sel) {
  var val = sel.value;
  await fetch('/api/form-submissions/'+id+'/status', {method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({status:val})});
  // ถ้าเปลี่ยนออกจาก pending → เช็คว่ายังมี pending อื่นอยู่ไหม
  if (val !== 'pending') {
    var remaining = allSubs.filter(function(r){ return r.id !== id && r.status === 'pending'; });
    if (remaining.length === 0) stopAlert();
  }
  loadAll();
}

async function updateIcuType(id, val) {
  await fetch('/api/form-submissions/'+id+'/icu-type', {method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({icuType:val})});
  loadAll();
}

async function updateUrg(id, val) {
  await fetch('/api/form-submissions/'+id+'/urgency', {method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({urgency:val})});
  loadAll();
}

async function updateAdm(id, val) {
  if (val === 'confirmed') {
    // เลือกเตียงอัตโนมัติ
    var beds = await fetch('/api/beds').then(function(r){return r.json();});
    var avail = beds.filter(function(b){return b.status==='available';});
    if (!avail.length) {
      alert('ไม่มีเตียงว่างในขณะนี้');
      loadAll();
      return;
    }
    var bedName = prompt('เลือกเตียงสำหรับผู้ป่วย:\n'+avail.map(function(b){return b.label;}).join(', ')+'\n\nพิมพ์ชื่อเตียง:');
    if (!bedName) { loadAll(); return; }
    var bed = avail.find(function(b){return b.label===bedName.trim();});
    if (!bed) { alert('ชื่อเตียงไม่ถูกต้อง'); loadAll(); return; }
    // อัปเดตสถานะเตียงเป็น occupied
    await fetch('/api/admin/beds/'+bed.id, {method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({status:'occupied'})});
    // บันทึก assigned_bed
    await fetch('/api/form-submissions/'+id+'/admission', {method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({admissionStatus:'confirmed', assignedBed:bed.label})});
  } else if (val === 'return_ward') {
    // ถ้าเคยมีเตียง ให้คืนเตียง
    await releaseBedIfAssigned(id);
    await fetch('/api/form-submissions/'+id+'/admission', {method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({admissionStatus:'return_ward', assignedBed:null})});
  } else {
    await fetch('/api/form-submissions/'+id+'/admission', {method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({admissionStatus:val, assignedBed:null})});
  }
  loadAll();
}

async function moveBed(id, currentBed) {
  var beds = await fetch('/api/beds').then(function(r){return r.json();});
  var avail = beds.filter(function(b){return b.status==='available';});
  if (!avail.length) { alert('ไม่มีเตียงว่าง'); return; }
  var bedName = prompt('เลือกเตียงใหม่:\n'+avail.map(function(b){return b.label;}).join(', ')+'\n\nพิมพ์ชื่อเตียง:');
  if (!bedName) return;
  var bed = avail.find(function(b){return b.label===bedName.trim();});
  if (!bed) { alert('ชื่อเตียงไม่ถูกต้อง'); return; }
  // คืนเตียงเก่า
  if (currentBed) {
    var oldBed = beds.find(function(b){return b.label===currentBed;});
    if (oldBed) await fetch('/api/admin/beds/'+oldBed.id, {method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({status:'available'})});
  }
  // จองเตียงใหม่
  await fetch('/api/admin/beds/'+bed.id, {method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({status:'occupied'})});
  await fetch('/api/form-submissions/'+id+'/admission', {method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({admissionStatus:'confirmed', assignedBed:bed.label})});
  loadAll();
}

async function releaseBedIfAssigned(id) {
  var sub = allSubs.find(function(r){return r.id===id;});
  if (sub && sub.assigned_bed) {
    var beds = await fetch('/api/beds').then(function(r){return r.json();});
    var bed = beds.find(function(b){return b.label===sub.assigned_bed;});
    if (bed) await fetch('/api/admin/beds/'+bed.id, {method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({status:'available'})});
  }
}

async function showDetail(id) {
  var r = await fetch('/api/form-submissions/'+id).then(function(r){return r.json();});
  var extra = typeof r.extra_data==='string' ? JSON.parse(r.extra_data) : (r.extra_data||{});

  // Emergency badge มุมขวาบน
  var emergencyBadge = extra.emergency
    ? '<span style="position:absolute;top:16px;right:50px;background:#e74c3c;color:#fff;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:700;">🚨 '+extra.emergency+'</span>'
    : '';
  document.getElementById('detailTitle').innerHTML = (r.patient_name||'-')+' (HN: '+(r.patient_hn||'-')+')'+emergencyBadge;

  var rows=[
    ['เวลาที่ส่ง', new Date(r.submitted_at).toLocaleString('th-TH')],
    ['ประเภท', formTypeLabel[r.form_type]||r.form_type||'-'],
    ['ชื่อ-สกุล', r.patient_name||'-'],
    ['HN', r.patient_hn||'-'],
    ['หอผู้ป่วย', r.ward||'-'],
    ['Diagnosis', r.diagnosis||'-'],
    ['Underlying disease', extra.underlying||''],
    ['ชื่อการผ่าตัด', extra.surgery_name||''],
    ['แพทย์ผู้ผ่าตัด', extra.doctor||''],
    ['วันที่ต้องการจอง', extra.booking_date||''],
    ['ระบบ', extra.system||''],
    ['SBP (mmHg.)', extra.sbp||''],
    ['HR (bpm.)', extra.hr||''],
    ['RR (bpm.)', extra.rr||''],
    ['Temp (°C)', extra.temp||''],
    ['SOS score', extra.sos_score||''],
    ['Conscious', extra.conscious||''],
    ['ปริมาณปัสสาวะ/8hrs', extra.urine||''],
    ['เรื่องที่ต้องการจอง', extra.reason||''],
    ['Resuscitation', extra.resuscitation||''],
    ['Line Notify', extra.line_notify||''],
  ].filter(function(rv){ return rv[1] && rv[1]!=='-' && rv[1]!==''; });

  document.getElementById('detailBody').innerHTML = rows.map(function(rv){
    return '<div class="modal-row"><b>'+rv[0]+'</b><span>'+rv[1]+'</span></div>';
  }).join('')
  + '<div class="modal-row" style="flex-direction:column;gap:6px;">'
  + '<div style="display:flex;justify-content:space-between;align-items:center;">'
  + '<b>หมายเหตุ</b>'
  + '<button onclick="deleteSubmission('+id+')" title="ลบคำขอนี้" style="background:none;border:none;cursor:pointer;font-size:20px;opacity:0.8;filter:sepia(1) saturate(5) hue-rotate(315deg);" onmouseover="this.style.opacity=1" onmouseout="this.style.opacity=0.8">🗑️</button>'
  + '</div>'
  + '<textarea id="noteInput" style="width:100%;padding:8px;border:1px solid #ddd;border-radius:8px;font-size:13px;min-height:60px;resize:vertical;">'+(r.decision_note||'')+'</textarea>'
  + '<button onclick="saveNote('+id+')" style="padding:8px;background:#06c755;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;">💾 บันทึกหมายเหตุ</button>'
  + '</div>';

  document.getElementById('detailModal').classList.add('show');
}

async function deleteSubmission(id) {
  var pw = prompt('ใส่รหัสผ่านเพื่อยืนยันการลบ:');
  if (pw === null) return;
  if (pw !== '1234') { alert('รหัสผ่านไม่ถูกต้อง'); return; }
  if (!confirm('ยืนยันลบคำขอ #'+id+' ?')) return;
  var res = await fetch('/api/form-submissions/'+id, {
    method:'DELETE'
  });
  if (res.ok) {
    document.getElementById('detailModal').classList.remove('show');
    await loadAll();
    alert('ลบเรียบร้อยแล้ว');
  } else {
    alert('เกิดข้อผิดพลาด ลองใหม่อีกครั้ง');
  }
}

async function saveNote(id) {
  var note = document.getElementById('noteInput').value;
  await fetch('/api/form-submissions/'+id+'/note', {
    method:'PUT', headers:{'Content-Type':'application/json'},
    body:JSON.stringify({note:note})
  });
  alert('บันทึกเรียบร้อย');
  loadAll();
}

function renderUsers(rows) {
  document.getElementById('usersBody').innerHTML=rows.map(function(u){
    return '<tr>'
      +'<td>'+(u.display_name||'-')+' <button onclick="editName('+u.id+',\''+((u.display_name||'').replace(/'/g,"\\'"))+'\')" style="padding:1px 6px;font-size:10px;border:1px solid #ccc;border-radius:4px;cursor:pointer;margin-left:4px;">✏️</button></td>'
      +'<td style="font-size:10px;color:#888;">'+u.line_user_id+'</td>'
      +'<td>'+u.role+'</td>'
      +'<td><select class="role-select" onchange="changeRole('+u.id+',this.value)">'
        +'<option value="pending"'+(u.role==='pending'?' selected':'')+'>pending</option>'
        +'<option value="requester"'+(u.role==='requester'?' selected':'')+'>requester</option>'
        +'<option value="approver"'+(u.role==='approver'?' selected':'')+'>approver</option>'
      +'</select></td></tr>';
  }).join('');
}

async function editName(id, cur) {
  var n=prompt('ใส่ชื่อใหม่:', cur);
  if (!n) return;
  await fetch('/api/admin/users/'+id+'/name', {method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({displayName:n.trim()})});
  loadAll();
}

async function changeRole(id, role) {
  await fetch('/api/admin/users/'+id+'/role', {method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({role:role})});
  loadAll();
}

checkAuth();
